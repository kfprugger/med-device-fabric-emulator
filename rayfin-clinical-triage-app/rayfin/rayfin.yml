id: rayfin-clinical-triage-app
name: rayfin-clinical-triage-app
version: 1.0.11
services:
  auth:
    enabled: true
    customClaims:
      app_version: 1.0.0
    scopes:
      - read:data
      - write:data
    password:
      enabled: false
    allowedRedirectUris:
      - http://localhost:5173
    fabric:
      enabled: true
  data:
    enabled: true
    dialect: mssql
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build
    indexDocument: index.html
